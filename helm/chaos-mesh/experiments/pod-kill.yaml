apiVersion: chaos-mesh.org/v1alpha1
kind: Schedule
metadata:
  name: pod-kill
  namespace: flink-lineage
spec:
  schedule: "*/2 * * * *"
  type: PodChaos
  historyLimit: 5
  concurrencyPolicy: Forbid
  podChaos:
    action: pod-kill
    mode: one
    selector:
      namespaces:
        - flink-lineage
      labelSelectors:
        app: flink-lineage
